<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TENEVERSIYA | SOUND DESIGN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(20, 20, 25, 0.45);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-highlight: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --accent: #d30033; /* Готический красный */
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            background-color: #030305;
            color: var(--text-main);
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            perspective: 1000px;
        }

        /* --- ФОНОВАЯ ДЫМКА --- */
        .ambient-background {
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            z-index: 0;
            pointer-events: none;
            background: 
                radial-gradient(circle at 50% 50%, rgba(30, 0, 10, 0.9), transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(10, 10, 30, 0.7), transparent 40%),
                radial-gradient(circle at 20% 80%, rgba(60, 0, 20, 0.6), transparent 50%);
            filter: blur(60px);
            animation: smokeMove 15s infinite alternate ease-in-out;
        }

        @keyframes smokeMove {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-2%, 3%) scale(1.05); }
            100% { transform: translate(3%, -2%) scale(1); }
        }

        /* Осколки стекла */
        .shard {
            position: absolute;
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0));
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20% 80% 30% 70% / 50% 40% 60% 50%;
            z-index: 1;
            animation: float 8s infinite ease-in-out alternate;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        .shard-1 { top: 5%; left: -10%; width: 180px; height: 180px; animation-delay: 0s; }
        .shard-2 { bottom: 10%; right: -5%; width: 220px; height: 250px; border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; animation-delay: -2s; }

        /* --- 3D ЗАГРУЗОЧНЫЙ ЭКРАН --- */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #020202;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
            perspective: 1000px;
        }

        /* Готический надгробный крест */
        .cross-3d {
            position: relative;
            width: 80px; height: 160px;
            transform-style: preserve-3d;
            animation: riseCross 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        .cross-core {
            position: absolute;
            background: linear-gradient(180deg, #2a2a2a, #0a0a0a);
            box-shadow: inset 0 0 10px rgba(0,0,0,1), 0 0 30px rgba(211, 0, 51, 0.6);
            border: 2px solid #444;
            border-radius: 4px;
        }
        .cross-vertical { width: 30px; height: 160px; left: 25px; top: 0; }
        .cross-horizontal { width: 100px; height: 30px; left: -10px; top: 40px; }

        @keyframes riseCross {
            0% { transform: rotateY(-90deg) rotateX(30deg) scale(0.3) translateY(100px); opacity: 0; }
            70% { transform: rotateY(10deg) rotateX(-5deg) scale(1.1) translateY(-10px); opacity: 1; }
            100% { transform: rotateY(0deg) rotateX(0deg) scale(1) translateY(0); opacity: 1; }
        }

        /* --- ОСНОВНОЙ КОНТЕЙНЕР --- */
        .main-container {
            position: relative;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
        }

        /* --- ЭФФЕКТ ЖИДКОГО СТЕКЛА (ТАХО) --- */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 
                0 40px 80px rgba(0,0,0,0.8), 
                inset 0 1px 1px var(--glass-highlight),
                inset 0 -1px 1px rgba(0,0,0,0.5);
            border-radius: 28px;
            width: 100%; max-width: 400px;
            padding: 35px 25px;
            position: absolute;
            opacity: 0;
            visibility: hidden;
            transform: scale(0.95) translateY(20px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; gap: 20px;
        }

        .glass-card.active {
            opacity: 1; visibility: visible;
            transform: scale(1) translateY(0);
        }

        /* Плавление пластика (переходы) */
        .glass-card.melt-out {
            transform: scale(1.05) translateY(-30px);
            opacity: 0;
            filter: blur(20px) contrast(150%);
        }
        .glass-card.melt-in {
            transform: scale(0.9) translateY(30px);
            opacity: 0;
            filter: blur(20px) contrast(150%);
        }

        h2 {
            font-weight: 900; text-transform: uppercase; letter-spacing: 3px;
            font-size: 24px; text-align: center; margin-bottom: 5px;
            background: linear-gradient(135deg, #fff, #666);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        p { font-size: 13px; color: #bbb; text-align: center; margin-bottom: 15px; }

        .input-group { display: flex; flex-direction: column; gap: 8px; position: relative; }
        
        .input-group label {
            font-size: 11px; color: #ddd; text-transform: uppercase;
            letter-spacing: 2px; padding-left: 5px; font-weight: 700;
        }

        /* --- ИНПУТЫ И ЭФФЕКТ РАЗРЫВА/ПЛАВЛЕНИЯ --- */
        input, textarea {
            width: 100%;
            background: rgba(10, 10, 15, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px; font-weight: 500;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.8);
            position: relative;
            z-index: 2;
        }

        input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.3); }

        textarea { resize: none; height: 110px; }

        /* Анимация при вводе текста (Глитч/Плавление) */
        input:focus, textarea:focus {
            border-color: var(--accent);
            background: linear-gradient(45deg, rgba(20,0,0,0.8), rgba(0,0,0,0.9));
            box-shadow: 
                0 0 20px rgba(211, 0, 51, 0.5), 
                inset 0 4px 15px rgba(0,0,0,0.9);
            animation: meltTear 3s infinite linear;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        @keyframes meltTear {
            0% { background-position: 0% 50%; box-shadow: 0 0 15px rgba(211,0,51,0.4), inset 0 2px 10px rgba(0,0,0,0.8); }
            50% { background-position: 100% 50%; box-shadow: 0 0 25px rgba(211,0,51,0.7), inset 0 5px 20px rgba(0,0,0,1); }
            100% { background-position: 0% 50%; box-shadow: 0 0 15px rgba(211,0,51,0.4), inset 0 2px 10px rgba(0,0,0,0.8); }
        }

        /* Жанры */
        .genre-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full-width { grid-column: span 2; }
        
        .option {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 16px 10px; text-align: center; border-radius: 14px;
            cursor: pointer; font-weight: 700; font-size: 13px;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            text-transform: uppercase; letter-spacing: 1px;
        }
        
        .option.selected {
            background: var(--accent); border-color: var(--accent);
            box-shadow: 0 10px 25px rgba(211, 0, 51, 0.5);
            color: #fff; transform: translateY(-3px) scale(1.02);
        }

        /* Кнопка */
        .btn {
            background: #fff; color: #000; border: none; padding: 18px;
            border-radius: 14px; font-size: 16px; font-weight: 900;
            text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; margin-top: 10px; transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(255,255,255,0.2);
        }
        .btn:active { transform: scale(0.95); }
        .btn.gothic { background: var(--accent); color: white; box-shadow: 0 10px 30px rgba(211, 0, 51, 0.5); }

        .error-msg { color: #ff4444; font-size: 12px; text-align: center; height: 15px; margin-top: -10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="cross-3d">
            <div class="cross-core cross-vertical"></div>
            <div class="cross-core cross-horizontal"></div>
        </div>
    </div>

    <div class="ambient-background" id="parallax-bg"></div>
    <div class="shard shard-1" id="p-shard1"></div>
    <div class="shard shard-2" id="p-shard2"></div>

    <div class="main-container" id="cards-container">

        <div class="glass-card active" id="step-1">
            <h2>КОНТАКТЫ</h2>
            <p>Введи данные для связи</p>

            <div class="input-group">
                <label>Имя / Псевдоним *</label>
                <input type="text" id="user-name" placeholder="Твое имя" autocomplete="off">
            </div>

            <div class="input-group">
                <label>Телефон (если нужен звонок)</label>
                <input type="tel" id="user-phone" placeholder="+7 (999) 000-00-00" autocomplete="off">
            </div>
            <div class="error-msg" id="err-1"></div>

            <button class="btn" onclick="nextStep(1, 2)">Далее ➔</button>
        </div>

        <div class="glass-card" id="step-2">
            <h2>ЖАНР</h2>
            <p>Выбери стилистику звука</p>

            <div class="genre-grid">
                <div class="option" onclick="selectGenre(this)">Поп</div>
                <div class="option" onclick="selectGenre(this)">Рок</div>
                <div class="option" onclick="selectGenre(this)">Поп-рок</div>
                <div class="option" onclick="selectGenre(this)">Электронная</div>
                <div class="option full-width" onclick="selectGenre(this)">Альтернатива</div>
            </div>
            <div class="error-msg" id="err-2"></div>

            <button class="btn" onclick="nextStep(2, 3)">Далее ➔</button>
        </div>

        <div class="glass-card" id="step-3">
            <h2>ИДЕЯ</h2>
            <p>Опиши своими словами, что именно ты хочешь</p>

            <div class="input-group">
                <label>Комментарий / Референсы *</label>
                <textarea id="user-comment" placeholder="Хочу мрачный бас, атмосферу как у..."></textarea>
            </div>
            <div class="error-msg" id="err-3"></div>

            <button class="btn gothic" onclick="submitOrder()">ОТПРАВИТЬ ЗАКАЗ</button>
        </div>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let orderData = {
            name: '', phone: '', genre: '', comment: '',
            username: tg.initDataUnsafe?.user?.username ? `@${tg.initDataUnsafe.user.username}` : 'Скрыт/Нет юзернейма'
        };

        // Гарантированное скрытие загрузчика
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 1500); // 1.5 секунды
        });

        // Параллакс
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 30;
            const y = (window.innerHeight / 2 - e.pageY) / 30;

            document.getElementById('parallax-bg').style.transform = `translate(${x}px, ${y}px)`;
            document.getElementById('p-shard1').style.transform = `translate(${x*1.5}px, ${y*1.5}px) rotate(${x}deg)`;
            document.getElementById('p-shard2').style.transform = `translate(${-x*2}px, ${-y*2}px) rotate(${-y}deg)`;
            document.getElementById('cards-container').style.transform = `rotateX(${y/4}deg) rotateY(${-x/4}deg)`;
        });

        function selectGenre(element) {
            document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            orderData.genre = element.innerText;
            document.getElementById('err-2').innerText = ''; 
        }

        function nextStep(currentNum, nextNum) {
            if (currentNum === 1) {
                const nameInput = document.getElementById('user-name').value.trim();
                if (!nameInput) {
                    document.getElementById('err-1').innerText = 'Укажи имя, чтобы я знал, как обращаться!';
                    return;
                }
                orderData.name = nameInput;
                orderData.phone = document.getElementById('user-phone').value.trim() || 'Не указан';
                document.getElementById('err-1').innerText = '';
            }
            if (currentNum === 2 && !orderData.genre) {
                document.getElementById('err-2').innerText = 'Выбери жанр!';
                return;
            }

            const currentCard = document.getElementById(`step-${currentNum}`);
            const nextCard = document.getElementById(`step-${nextNum}`);

            // Эффект плавления
            currentCard.classList.remove('active');
            currentCard.classList.add('melt-out');
            nextCard.classList.add('melt-in');

            setTimeout(() => {
                currentCard.classList.remove('melt-out');
                nextCard.classList.remove('melt-in');
                nextCard.classList.add('active');
            }, 400);
        }

        function submitOrder() {
            const comment = document.getElementById('user-comment').value.trim();
            if (!comment) {
                document.getElementById('err-3').innerText = 'Опиши идею хотя бы в паре слов!';
                return;
            }
            orderData.comment = comment;

            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
            
            // Отправляем данные боту и закрываем
            tg.sendData(JSON.stringify(orderData));
        }
    </script>
</body>
</html>
