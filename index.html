<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stivensi Sound</title>
    <!-- Подключаем библиотеку Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* БАЗОВЫЕ НАСТРОЙКИ И ФОН */
        :root {
            --tg-theme-bg-color: #050000;
            --tg-theme-text-color: #ffffff;
            --primary-red: #cc0000;
            --dark-red: #330000;
            --glass-bg: rgba(20, 0, 0, 0.4);
            --glass-border: rgba(255, 50, 50, 0.2);
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            background-image: radial-gradient(circle at 50% 0%, var(--dark-red) 0%, #000000 70%);
            color: var(--tg-theme-text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(204, 0, 0, 0.5);
        }

        /* КОНТЕЙНЕР ДЛЯ КАРТОЧЕК */
        .container {
            width: 100%;
            max-width: 500px;
            perspective: 1000px; /* Для 3D параллакса */
        }

        /* ЭФФЕКТ СТЕКЛА (GLASSMORPHISM) */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(204, 0, 0, 0.05);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            position: relative;
            overflow: hidden;
        }

        /* Переливающийся блик на стекле */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.05), transparent);
            transform: skewX(-20deg);
            animation: shine 6s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        .service-title {
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            transform: translateZ(20px); /* 3D вылет текста */
        }

        /* СЕЛЕКТОРЫ КАЧЕСТВА */
        select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            appearance: none;
            margin-bottom: 20px;
            transform: translateZ(15px);
            cursor: pointer;
        }

        select:focus {
            border-color: var(--primary-red);
            box-shadow: 0 0 10px rgba(204, 0, 0, 0.3);
        }

        /* СВЕТЯЩИЙСЯ ЦЕННИК ИЗ-ПОД СТЕКЛА */
        .price-container {
            position: relative;
            text-align: center;
            margin: 20px 0;
            transform: translateZ(30px);
        }

        .price-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 40px;
            background: var(--primary-red);
            filter: blur(25px); /* Тот самый свет из-за стекла */
            opacity: 0.6;
            z-index: 1;
            transition: opacity 0.3s;
        }

        .price-text {
            position: relative;
            z-index: 2;
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8); /* Чтобы текст читался поверх света */
            transition: color 0.3s;
        }

        /* КНОПКА ЗАКАЗА */
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary-red), #660000);
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(204, 0, 0, 0.4);
            transform: translateZ(25px);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:active {
            transform: translateZ(10px) scale(0.98);
            box-shadow: 0 2px 10px rgba(204, 0, 0, 0.6);
        }

    </style>
</head>
<body>

    <h1>Stivensi</h1>

    <div class="container" id="app-container">
        
        <!-- КАРТОЧКА: СОЗДАНИЕ МУЗЫКИ -->
        <div class="glass-card js-tilt">
            <h2 class="service-title">Создание музыки</h2>
            <select id="music-quality" onchange="updatePrice('music')">
                <option value="demo">Демо (Набросок)</option>
                <option value="bad">Базовое (Черновик)</option>
                <option value="medium">Среднее (Хороший звук)</option>
                <option value="good" selected>Хорошо (Под ключ)</option>
            </select>
            
            <div class="price-container">
                <div class="price-glow"></div>
                <div class="price-text" id="music-price">15000 ₽</div>
            </div>

            <button class="btn" onclick="sendOrder('Создание музыки', 'music')">Заказать музыку</button>
        </div>

        <!-- КАРТОЧКА: СВЕДЕНИЕ -->
        <div class="glass-card js-tilt">
            <h2 class="service-title">Сведение и Мастеринг</h2>
            <select id="mix-quality" onchange="updatePrice('mix')">
                <option value="demo">Демо (Быстрый баланс)</option>
                <option value="bad">Базовое (Черновик)</option>
                <option value="medium">Среднее (Стандарт)</option>
                <option value="good" selected>Хорошо (Коммерция)</option>
            </select>
            
            <div class="price-container">
                <div class="price-glow"></div>
                <div class="price-text" id="mix-price">8000 ₽</div>
            </div>

            <button class="btn" onclick="sendOrder('Сведение', 'mix')">Заказать сведение</button>
        </div>

    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран
        tg.ready();

        // --- ЛОГИКА ЦЕН (НАСТРОЙ ПОД СЕБЯ) ---
        const prices = {
            music: { demo: 2000, bad: 5000, medium: 10000, good: 15000 },
            mix: { demo: 1000, bad: 3000, medium: 5000, good: 8000 }
        };

        const names = {
            demo: "Демо", bad: "Базовое", medium: "Среднее", good: "Хорошо (Под ключ)"
        };

        function updatePrice(serviceType) {
            const select = document.getElementById(`${serviceType}-quality`);
            const priceElement = document.getElementById(`${serviceType}-price`);
            const selectedQuality = select.value;
            const price = prices[serviceType][selectedQuality];
            
            // Анимация смены цены (мигание)
            priceElement.style.opacity = 0;
            setTimeout(() => {
                priceElement.innerText = `${price} ₽`;
                priceElement.style.opacity = 1;
            }, 200);
        }

        // Отправка данных в бота
        function sendOrder(serviceName, serviceType) {
            const select = document.getElementById(`${serviceType}-quality`);
            const qualityValue = select.value;
            const price = prices[serviceType][qualityValue];
            const qualityName = names[qualityValue];

            const data = {
                service: serviceName,
                quality: qualityName,
                price: price
            };

            // Отправляем JSON строку в бота
            tg.sendData(JSON.stringify(data));
        }

        // --- ЭФФЕКТ ПАРАЛЛАКСА (НАКЛОН КАРТОЧЕК) ---
        const cards = document.querySelectorAll('.js-tilt');
        
        cards.forEach(card => {
            // Для ПК (мышь)
            card.addEventListener('mousemove', handleMove);
            card.addEventListener('mouseleave', handleLeave);
            // Для Телефонов (касание)
            card.addEventListener('touchmove', handleTouchMove);
            card.addEventListener('touchend', handleLeave);
        });

        function handleMove(e) {
            const card = e.currentTarget;
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left; // x position within the element.
            const y = e.clientY - rect.top;  // y position within the element.
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            // Вычисляем угол наклона (максимум 10 градусов)
            const rotateX = ((y - centerY) / centerY) * -10;
            const rotateY = ((x - centerX) / centerX) * 10;

            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        }

        function handleTouchMove(e) {
            // Предотвращаем скролл страницы при анимации (опционально)
            // e.preventDefault(); 
            const card = e.currentTarget;
            const rect = card.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            const rotateX = ((y - centerY) / centerY) * -10;
            const rotateY = ((x - centerX) / centerX) * 10;

            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        }

        function handleLeave(e) {
            const card = e.currentTarget;
            card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg)`;
        }
    </script>
</body>
</html>
