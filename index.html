<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TENEVERSIYA | GOTHIC SOUND</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-black: #050505;
            --accent-red: #8b0000;
            --bright-red: #ff0000;
            --glass-bg: rgba(10, 10, 10, 0.8);
            --glass-border: rgba(255, 0, 0, 0.15);
            --text-gray: #a0a0a0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* МРАЧНЫЙ ФОН */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a0000 0%, #050505 100%);
            z-index: -2;
        }

        /* ЭКРАН ЗАГРУЗКИ (КРЕСТ) */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .cross-container {
            width: 60px; height: 100px;
            position: relative;
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .cross-v { width: 16px; height: 100px; background: var(--bright-red); position: absolute; left: 22px; box-shadow: 0 0 25px var(--bright-red); }
        .cross-h { width: 60px; height: 16px; background: var(--bright-red); position: absolute; top: 30px; box-shadow: 0 0 25px var(--bright-red); }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* СТРАНИЦЫ */
        .page { display: none; padding: 20px; max-width: 500px; margin: 0 auto; animation: slideUp 0.4s ease; }
        .page.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .logo-box { text-align: center; margin-bottom: 30px; }
        .logo-main { font-size: 2.2rem; letter-spacing: 6px; text-shadow: 0 0 10px var(--accent-red); margin: 0; }
        
        /* КАРТОЧКИ-СТЕКЛО */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 18px;
            margin-bottom: 15px;
            position: relative;
            transition: 0.3s;
            cursor: pointer;
        }

        .glass-card:active { transform: scale(0.98); border-color: var(--bright-red); }
        .glass-card.selected { border-color: var(--bright-red); background: rgba(139, 0, 0, 0.1); }

        .genre-name { font-size: 1.3rem; margin: 0; letter-spacing: 2px; }
        .price-info { color: var(--bright-red); font-size: 0.9rem; margin-top: 8px; font-weight: bold; }

        /* СПИСОК УСЛУГ */
        .service-row { display: flex; justify-content: space-between; align-items: center; }
        .check { width: 22px; height: 22px; border: 1px solid var(--accent-red); }
        .selected .check { background: var(--bright-red); box-shadow: 0 0 10px var(--bright-red); }

        textarea {
            width: 100%; height: 100px; background: #000; border: 1px solid var(--glass-border);
            color: #fff; padding: 12px; margin-top: 10px; outline: none;
        }

        .btn {
            width: 100%; padding: 18px; background: var(--accent-red); color: #fff;
            border: none; text-transform: uppercase; letter-spacing: 3px; font-weight: bold; margin-top: 20px;
        }
        .total-display { text-align: center; font-size: 1.8rem; margin: 20px 0; color: #fff; }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div id="loader">
        <div class="cross-container">
            <div class="cross-v"></div>
            <div class="cross-h"></div>
        </div>
    </div>

    <!-- ВЫБОР ЖАНРА -->
    <div id="p-genres" class="page active">
        <div class="logo-box">
            <h1 class="logo-main">TENEVERSIYA</h1>
            <p style="color:var(--accent-red); font-size: 0.7rem; letter-spacing: 3px;">SOUND ENGINEERING</p>
        </div>

        <div class="glass-card" onclick="selG('ROCK', 1.3)">
            <h2 class="genre-name">ROCK / METAL</h2>
            <div class="price-info">Сложность: Высокая (x1.3)</div>
        </div>
        <div class="glass-card" onclick="selG('POP', 1.0)">
            <h2 class="genre-name">POP / MELODIC</h2>
            <div class="price-info">Сложность: Стандарт (x1.0)</div>
        </div>
        <div class="glass-card" onclick="selG('ELECTRONIC', 1.1)">
            <h2 class="genre-name">ELECTRONIC</h2>
            <div class="price-info">Сложность: Средняя (x1.1)</div>
        </div>
        <div class="glass-card" onclick="selG('HOUSE', 1.05)">
            <h2 class="genre-name">HOUSE / TECH</h2>
            <div class="price-info">Сложность: Базовая (x1.05)</div>
        </div>
    </div>

    <!-- ВЫБОР УСЛУГ -->
    <div id="p-services" class="page">
        <button onclick="nav('p-genres')" style="background:none; border:none; color:var(--text-gray); cursor:pointer; margin-bottom:15px;">← К ЖАНРАМ</button>
        <h2 id="cur-g" style="margin-bottom:20px; letter-spacing:2px; color:var(--bright-red)"></h2>
        <div id="serv-list"></div>
        <div class="total-display"><span id="total-val">0</span> ₽</div>
        <button class="btn" onclick="nav('p-final')">ДАЛЕЕ</button>
    </div>

    <!-- ФИНАЛ -->
    <div id="p-final" class="page">
        <button onclick="nav('p-services')" style="background:none; border:none; color:var(--text-gray); cursor:pointer; margin-bottom:15px;">← НАЗАД</button>
        <h2 style="letter-spacing:2px;">КОММЕНТАРИЙ</h2>
        <div class="glass-card">
            <p style="font-size:0.8rem; color:var(--text-gray)">Опиши референсы или пожелания:</p>
            <textarea id="comment" placeholder="Напиши здесь..."></textarea>
        </div>
        <div class="total-display">ИТОГО: <span id="total-val-f">0</span> ₽</div>
        <button class="btn" onclick="sendOrder()">ЗАКАЗАТЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Скрываем загрузку через 1.5 сек принудительно
        setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
        }, 1500);

        let curG = "";
        let mult = 1.0;
        let selected = [];

        const prices = [
            { id: 'mix', name: 'Сведение', base: 5000 },
            { id: 'full', name: 'Трек под ключ', base: 25000 },
            { id: 'text', name: 'Текст песни', base: 4500 },
            { id: 'inst', name: 'Инструментал', base: 12000 },
            { id: 'help', name: 'Помощь с проектом', base: 3500 }
        ];

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function selG(name, m) {
            curG = name;
            mult = m;
            document.getElementById('cur-g').innerText = name;
            render();
            nav('p-services');
        }

        function toggle(id) {
            if (selected.includes(id)) selected = selected.filter(x => x !== id);
            else selected.push(id);
            render();
        }
        function render() {
            let total = 0;
            const list = document.getElementById('serv-list');
            list.innerHTML = '';
            
            prices.forEach(s => {
                const p = Math.round(s.base * mult);
                const isSel = selected.includes(s.id);
                if (isSel) total += p;

                const div = document.createElement('div');
                div.className = glass-card service-row ${isSel ? 'selected' : ''};
                div.onclick = () => toggle(s.id);
                div.innerHTML = 
                    <div>
                        <div style="font-weight:bold">${s.name}</div>
                        <div style="font-size:0.8rem; opacity:0.6">${p} ₽</div>
                    </div>
                    <div class="check"></div>
                ;
                list.appendChild(div);
            });

            document.getElementById('total-val').innerText = total;
            document.getElementById('total-val-f').innerText = total;
        }

        function sendOrder() {
            if (selected.length === 0) return tg.showAlert("Выбери услуги");
            
            const data = {
                genre: curG,
                services: selected.map(id => prices.find(p => p.id === id).name),
                total: document.getElementById('total-val-f').innerText,
                comment: document.getElementById('comment').value || "Без комментария"
            };

            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
