<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TENEVERSIYA | SOUND DESIGN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(15, 15, 18, 0.65);
            --glass-border-top: rgba(255, 255, 255, 0.15);
            --glass-border-bot: rgba(0, 0, 0, 0.8);
            --accent: #b30027; /* Темный кроваво-красный */
            --text-main: #e0e0e0;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }

        body, html {
            background-color: #020202;
            color: var(--text-main);
            overflow: hidden;
            height: 100vh; width: 100vw;
            perspective: 1200px;
        }

        /* --- ГЛУБОКАЯ ДЫМКА --- */
        .ambient-bg {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; z-index: 0; pointer-events: none;
            background: 
                radial-gradient(circle at 40% 40%, rgba(40, 0, 10, 0.9), transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(10, 10, 20, 0.8), transparent 40%),
                radial-gradient(circle at 20% 80%, rgba(50, 0, 0, 0.4), transparent 50%);
            filter: blur(70px) contrast(120%);
            animation: smokePulse 15s infinite alternate ease-in-out;
        }
        @keyframes smokePulse { 0% { transform: scale(1) translate(0,0); } 100% { transform: scale(1.1) translate(-2%, 2%); } }

        /* --- РАЗРУШЕНИЕ НА ПК (ОСЫПАЮЩИЕСЯ ОСКОЛКИ) --- */
        .debris-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; display: none; }
        @media (min-width: 768px) { .debris-container { display: block; } }
        
        .debris {
            position: absolute; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg) scale(1); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg) scale(0.5); opacity: 0; }
        }

        /* --- 3D КРЕСТ (ЗАГРУЗКА) --- */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; justify-content: center; align-items: center; transition: 0.8s ease;
        }
        .cross-3d { width: 50px; height: 120px; position: relative; transform-style: preserve-3d; animation: floatCross 2s infinite alternate ease-in-out; }
        .c-vert, .c-horiz { position: absolute; background: linear-gradient(to bottom, #333, #050505); border: 1px solid #222; box-shadow: 0 0 20px rgba(179,0,39,0.5); }
        .c-vert { width: 20px; height: 120px; left: 15px; }
        .c-horiz { width: 80px; height: 20px; left: -15px; top: 30px; }
        @keyframes floatCross { 0% { transform: rotateY(0deg) translateY(0); } 100% { transform: rotateY(20deg) translateY(-10px); } }

        /* --- ДОРОГОЕ СТЕКЛО --- */
        .main-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 10; padding: 20px; }
        
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(50px) saturate(180%);
            -webkit-backdrop-filter: blur(50px) saturate(180%);
            border-top: 1px solid var(--glass-border-top);
            border-left: 1px solid var(--glass-border-top);
            border-bottom: 1px solid var(--glass-border-bot);
            border-right: 1px solid var(--glass-border-bot);
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 20px rgba(255,255,255,0.02);
            border-radius: 20px; width: 100%; max-width: 420px; padding: 30px;
            position: absolute; opacity: 0; visibility: hidden; transform: scale(0.9) translateY(20px);
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex; flex-direction: column; gap: 15px;
        }
        .glass-card.active { opacity: 1; visibility: visible; transform: scale(1) translateY(0); }
        
        /* Эффект плавления при смене экранов */
        .glass-card.melt-out { transform: scale(1.05) skewX(2deg) translateY(-30px); opacity: 0; filter: blur(15px) contrast(150%); }
        .glass-card.melt-in { transform: scale(0.9) skewX(-2deg) translateY(30px); opacity: 0; filter: blur(15px) contrast(150%); }

        h2 { font-weight: 900; text-transform: uppercase; font-size: 22px; text-align: center; letter-spacing: 2px; text-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        p.sub { font-size: 12px; color: #888; text-align: center; margin-bottom: 10px; }

        /* --- ИНПУТЫ И РАЗРЫВ ТЕКСТА --- */
        .input-group label { font-size: 11px; color: #aaa; text-transform: uppercase; font-weight: 700; margin-bottom: 5px; display: block; }
        input, textarea {
            width: 100%; background: rgba(5,5,8,0.7); border: 1px solid rgba(255,255,255,0.1); color: #fff;
            padding: 15px; border-radius: 10px; font-size: 15px; outline: none; transition: 0.3s;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.8);
        }
        textarea { resize: none; height: 90px; }

        /* Эффект плавления/глитча при фокусе */
        input:focus, textarea:focus {
            background: rgba(20,0,5,0.9);
            border-color: var(--accent);
            color: #fff;
            animation: inputGlitch 0.2s infinite alternate;
        }
        @keyframes inputGlitch {
            0% { box-shadow: 0 0 10px rgba(179,0,39,0.3), inset 0 2px 10px rgba(0,0,0,0.8); text-shadow: 2px 0 0 rgba(255,0,0,0.5), -2px 0 0 rgba(0,0,255,0.5); }
            100% { box-shadow: 0 0 25px rgba(179,0,39,0.8), inset 0 5px 20px rgba(0,0,0,1); text-shadow: -2px 1px 0 rgba(255,0,0,0.5), 2px -1px 0 rgba(0,0,255,0.5); }
        }

        /* Кнопки выбора (Сетка) */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-1 { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .option {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            padding: 14px 5px; text-align: center; border-radius: 10px; cursor: pointer;
            font-weight: 700; font-size: 12px; text-transform: uppercase; transition: 0.3s;
        }
        .option.selected { background: var(--accent); border-color: var(--accent); box-shadow: 0 5px 20px rgba(179,0,39,0.6); color: #fff; transform: scale(1.02); }

        .btn {
            background: #fff; color: #000; border: none; padding: 16px; border-radius: 10px;
            font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; transition: 0.3s; width: 100%;
        }
        .btn:active { transform: scale(0.95); }
        .btn.gothic { background: var(--accent); color: #fff; box-shadow: 0 5px 20px rgba(179,0,39,0.5); }

        .price-display { text-align: center; font-size: 18px; font-weight: 900; color: #fff; margin-top: 10px; text-shadow: 0 0 15px rgba(255,255,255,0.5); display: none; }
        .error-msg { color: var(--accent); font-size: 11px; text-align: center; height: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loader"><div class="cross-3d"><div class="c-vert"></div><div class="c-horiz"></div></div></div>

    <div class="ambient-bg" id="parallax-bg"></div>
    <div class="debris-container" id="debris"></div>

    <div class="main-container" id="cards-container">

        <div class="glass-card active" id="step-1">
            <h2>КОНТАКТЫ</h2>
            <p class="sub">Данные для связи</p>
            <div class="input-group">
                <label>Имя / Псевдоним *</label>
                <input type="text" id="user-name" placeholder="Твое имя" autocomplete="off">
            </div>
            <div class="input-group">
                <label>Телефон (опционально)</label>
                <input type="tel" id="user-phone" placeholder="+7 (999) 000-00-00" autocomplete="off">
            </div>
            <div class="error-msg" id="err-1"></div>
            <button class="btn" onclick="nextStep(1, 2)">Далее ➔</button>
        </div>

        <div class="glass-card" id="step-2">
            <h2>УСЛУГА</h2>
            <p class="sub">Что именно нужно сделать?</p>
            <div class="grid-1">
                <div class="option" onclick="selectItem('service', this)">Сведение</div>
                <div class="option" onclick="selectItem('service', this)">Создание текста</div>
                <div class="option" onclick="selectItem('service', this)">Аранжировка</div>
                <div class="option" onclick="selectItem('service', this)">Помощь с треком</div>
            </div>
            <div class="error-msg" id="err-2"></div>
            <button class="btn" onclick="nextStep(2, 3)">Далее ➔</button>
        </div>

        <div class="glass-card" id="step-3">
            <h2>ЖАНР</h2>
            <p class="sub">От жанра зависит итоговая стоимость</p>
            <div class="grid-2">
                <div class="option" onclick="selectItem('genre', this)">Поп</div>
                <div class="option" onclick="selectItem('genre', this)">Рок</div>
                <div class="option" onclick="selectItem('genre', this)">Поп-рок</div>
                <div class="option" onclick="selectItem('genre', this)">Электронная</div>
                <div class="option" style="grid-column: span 2;" onclick="selectItem('genre', this)">Альтернатива</div>
            </div>
            <div class="price-display" id="calc-price">ИТОГО: 0₽</div>
            <div class="error-msg" id="err-3"></div>
            <button class="btn" onclick="nextStep(3, 4)">Далее ➔</button>
        </div>

        <div class="glass-card" id="step-4">
            <h2>ИДЕЯ</h2>
            <p class="sub">Опиши пожелания</p>
            <div class="input-group">
                <textarea id="user-comment" placeholder="Хочу мрачный звук, реф - такой-то трек..."></textarea>
            </div>
            <div class="error-msg" id="err-4"></div>
            <button class="btn gothic" onclick="submitOrder()">ОТПРАВИТЬ ЗАКАЗ</button>
        </div>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let orderData = { 
            name: '', phone: '', service: '', genre: '', price: '', comment: '',
            username: tg.initDataUnsafe?.user?.username ? `@${tg.initDataUnsafe.user.username}` : 'Скрыт'
        };

        // --- МАТРИЦА ЦЕН (ПОМЕНЯЙ ЦИФРЫ ПОД СЕБЯ) ---
        const priceList = {
            'Поп': { 'Сведение': '5000₽', 'Создание текста': '3000₽', 'Аранжировка': '10000₽', 'Помощь с треком': '2000₽' },
            'Рок': { 'Сведение': '6000₽', 'Создание текста': '3000₽', 'Аранжировка': '12000₽', 'Помощь с треком': '2500₽' },
            'Поп-рок': { 'Сведение': '5500₽', 'Создание текста': '3000₽', 'Аранжировка': '11000₽', 'Помощь с треком': '2500₽' },
            'Электронная': { 'Сведение': '4500₽', 'Создание текста': '2000₽', 'Аранжировка': '9000₽', 'Помощь с треком': '2000₽' },
            'Альтернатива': { 'Сведение': '6500₽', 'Создание текста': '3500₽', 'Аранжировка': '13000₽', 'Помощь с треком': '3000₽' }
        };

        // Лоадер
        window.addEventListener('load', () => {
            setTimeout(() => { document.getElementById('loader').style.opacity = '0'; setTimeout(() => document.getElementById('loader').style.display = 'none', 800); }, 1500);
            createDebris();
        });

        // Генерация осыпающихся осколков для ПК
        function createDebris() {
            const container = document.getElementById('debris');
            for(let i=0; i<15; i++) {
                let div = document.createElement('div');
                div.className = 'debris';
                div.style.left = Math.random() * 100 + 'vw';
                div.style.width = Math.random() * 40 + 10 + 'px';
                div.style.height = div.style.width;
                div.style.clipPath = `polygon(${Math.random()*100}% 0, 100% ${Math.random()*100}%, ${Math.random()*100}% 100%, 0 ${Math.random()*100}%)`;
                div.style.animationDuration = Math.random() * 5 + 5 + 's';
                div.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(div);
            }
        }

        // Параллакс
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 30; const y = (window.innerHeight / 2 - e.pageY) / 30;
            document.getElementById('parallax-bg').style.transform = `translate(${x}px, ${y}px)`;
            document.getElementById('cards-container').style.transform = `rotateX(${y/3}deg) rotateY(${-x/3}deg)`;
        });

        // Выбор элементов и расчет цены
        function selectItem(type, element) {
            element.parentElement.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            orderData[type] = element.innerText;
            
            if(type === 'service') document.getElementById('err-2').innerText = '';
            if(type === 'genre') {
                document.getElementById('err-3').innerText = '';
                // Считаем цену
                if(orderData.service && orderData.genre) {
                    orderData.price = priceList[orderData.genre][orderData.service] || 'По договоренности';
                    const pDisp = document.getElementById('calc-price');
                    pDisp.innerText = `ИТОГО: ${orderData.price}`;
                    pDisp.style.display = 'block';
                }
            }
        }

        function nextStep(curr, next) {
            if (curr === 1) {
                if (!document.getElementById('user-name').value.trim()) return document.getElementById('err-1').innerText = 'Укажи имя!';
                orderData.name = document.getElementById('user-name').value.trim();
                orderData.phone = document.getElementById('user-phone').value.trim();
                document.getElementById('err-1').innerText = '';
            }
            if (curr === 2 && !orderData.service) return document.getElementById('err-2').innerText = 'Выбери услугу!';
            if (curr === 3 && !orderData.genre) return document.getElementById('err-3').innerText = 'Выбери жанр!';

            const cCard = document.getElementById(`step-${curr}`);
            const nCard = document.getElementById(`step-${next}`);
            cCard.classList.remove('active'); cCard.classList.add('melt-out'); nCard.classList.add('melt-in');
            setTimeout(() => { cCard.classList.remove('melt-out'); nCard.classList.remove('melt-in'); nCard.classList.add('active'); }, 300);
        }

        function submitOrder() {
            if (!document.getElementById('user-comment').value.trim()) return document.getElementById('err-4').innerText = 'Опиши идею!';
            orderData.comment = document.getElementById('user-comment').value.trim();
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            tg.sendData(JSON.stringify(orderData));
        }
    </script>
</body>
</html>
